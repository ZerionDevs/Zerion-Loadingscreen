<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Background Slideshow -->
    <div id="slideshow" class="slideshow" aria-hidden="true">
        <div class="slide slide-a"></div>
        <div class="slide slide-b"></div>
    </div>
    <div class="overlay"></div>

    <!-- Sidebar: Music + Player of the Weekend -->
    <div class="sidebar-panel">
    <aside id="music-player" class="music-player" aria-label="Music player">
        <div class="player-track">
            <div class="player-cover-wrap">
                <img id="player-cover" class="player-cover" src="" alt="Album cover">
            </div>
            <div class="player-meta">
                <p id="player-title" class="player-title">—</p>
                <p id="player-artist" class="player-artist">—</p>
            </div>
        </div>

        <div class="player-progress-row">
            <span id="player-current" class="player-time">0:00</span>
            <div class="player-seek-wrap">
                <input type="range" id="player-seek" class="player-seek" min="0" max="100" value="0" aria-label="Seek">
            </div>
            <span id="player-duration" class="player-time">0:00</span>
        </div>

        <div class="player-controls">
            <button type="button" id="btn-vol-down" class="ctrl-btn ctrl-vol" aria-label="Volume down">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            </button>
            <div class="player-nav">
                <button type="button" id="btn-prev" class="ctrl-btn" aria-label="Previous track">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6V6zm3.5 6l8.5 6V6l-8.5 6z"/></svg>
                </button>
                <button type="button" id="btn-play" class="ctrl-btn ctrl-play" aria-label="Play">
                    <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7L8 5z"/></svg>
                    <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button type="button" id="btn-next" class="ctrl-btn" aria-label="Next track">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 18h2V6h-2v12zm-3.5-6l-8.5-6v12l8.5-6z"/></svg>
                </button>
            </div>
            <button type="button" id="btn-vol-up" class="ctrl-btn ctrl-vol" aria-label="Volume up">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </button>
        </div>

        <div class="player-volume-row">
            <svg class="vol-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
            <input type="range" id="player-volume" class="player-volume" min="0" max="100" value="45" aria-label="Volume">
            <svg class="vol-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </div>

        <audio id="audio" preload="auto"></audio>
    </aside>

    <aside id="player-weekend" class="player-weekend hidden" aria-label="Player of the Weekend">
        <div class="potw-header">
            <span id="potw-label" class="potw-label">Player of the Weekend</span>
            <svg class="potw-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 2l2.4 7.4H22l-6 4.6 2.3 7L12 17.8 5.7 21l2.3-7-6-4.6h7.6L12 2z"/>
            </svg>
        </div>
        <div class="potw-body">
            <div class="potw-avatar-wrap">
                <img id="potw-avatar" class="potw-avatar" src="" alt="">
            </div>
            <div class="potw-info">
                <p id="potw-name" class="potw-name">—</p>
                <p id="potw-subtitle" class="potw-subtitle">—</p>
            </div>
        </div>
    </aside>
    </div>

    <!-- Link Dock: Discord / Website / Staff -->
    <nav class="link-dock" aria-label="Quick links">
        <a id="link-discord" class="dock-btn hidden" href="#">
            <span class="dock-icon">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                </svg>
            </span>
            <span class="dock-label">Discord</span>
        </a>
        <a id="link-website" class="dock-btn hidden" href="#">
            <span class="dock-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M2 12h20"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
            </span>
            <span class="dock-label">Website</span>
        </a>
        <button type="button" class="dock-btn" data-panel="staff">
            <span class="dock-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
            </span>
            <span class="dock-label">Staff</span>
        </button>
    </nav>

    <!-- Main Content -->
    <main class="content">
        <header class="brand">
            <img id="brand-logo" class="brand-logo hidden" src="" alt="">
            <h1 id="brand-name" class="brand-name"></h1>
            <p id="brand-tagline" class="brand-tagline"></p>
        </header>

        <footer class="loading-footer">
            <div class="loading-info">
                <p id="loading-label" class="loading-label"></p>
                <p id="loading-tip" class="loading-tip"></p>
            </div>
            <div id="progress-wrap" class="progress-wrap">
                <div class="progress-track">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <span id="progress-percent" class="progress-percent">0%</span>
            </div>
        </footer>
    </main>

    <!-- Modal -->
    <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-backdrop" data-close></div>
        <div class="modal-panel">
            <header class="modal-header">
                <div>
                    <h2 id="modal-title" class="modal-title"></h2>
                    <p id="modal-subtitle" class="modal-subtitle"></p>
                </div>
                <button type="button" class="modal-close" data-close aria-label="Close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </header>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
